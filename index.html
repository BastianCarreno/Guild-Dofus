<!-- FIREBASE SDK v12 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, updateDoc, setDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  // Tu configuración oficial de Firebase para Los-Perversos
  const firebaseConfig = {
    apiKey: "AIzaSyD-ZARNy4qlxb8b5p26-DcuHQEw3BSn-oE",
    authDomain: "miembros-c2d72.firebaseapp.com",
    projectId: "miembros-c2d72",
    storageBucket: "miembros-c2d72.firebasestorage.app",
    messagingSenderId: "489865592759",
    appId: "1:489865592759:web:1fb67cf15858e2639cf232",
    measurementId: "G-1W6NPV7X03"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // --- ESTADO EN MEMORIA DE LA APP ---
  window.MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  window.WEEKDAYS = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  
  window.guildData = { name: 'Los-Perversos', level: 1, server: 'Cargando...', desc: '...' };
  window.membersList = [];
  window.eventsData = {};

  window.currentYear = new Date().getFullYear();
  window.currentMonth = new Date().getMonth();
  window.editingMemberId = null;
  window.tempOficios = [];

  // --- ESCUCHADORES EN TIEMPO REAL (FIRESTORE) ---
  
  // Escuchar metadatos del gremio
  onSnapshot(doc(db, "guild_config", "los-perversos"), (docSnap) => {
    if (docSnap.exists()) {
      window.guildData = docSnap.data();
    } else {
      setDoc(doc(db, "guild_config", "los-perversos"), window.guildData);
    }
    renderGuildHeader();
    fillGuildSettingsForm();
  });

  // Escuchar lista de miembros
  onSnapshot(doc(db, "guild_data", "members"), (docSnap) => {
    window.membersList = docSnap.exists() ? (docSnap.data().list || []) : [];
    renderMembers();
  });

  // Escuchar eventos / Almanax
  onSnapshot(doc(db, "guild_data", "events"), (docSnap) => {
    window.eventsData = docSnap.exists() ? (docSnap.data().schedule || {}) : {};
    if (document.getElementById('sec-calendar').classList.contains('active')) {
      renderCalendar();
    } else {
      updateStatsOnly();
    }
  });

  // --- MONITOREO DE AUTENTICACIÓN (ADMIN/GUEST) ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.body.classList.add('is-admin');
      document.getElementById('authBadgeGuest').classList.add('hidden');
      document.getElementById('authBadgeAdmin').classList.remove('hidden');
      document.getElementById('btnAuthAction').textContent = "Salir";
    } else {
      document.body.classList.remove('is-admin');
      document.getElementById('authBadgeAdmin').classList.add('hidden');
      document.getElementById('authBadgeGuest').classList.remove('hidden');
      document.getElementById('btnAuthAction').textContent = "Entrar";
    }
    renderMembers();
  });

  // --- FUNCIONES EXPUESTAS AL AMBITO GLOBAL ---
  window.handleAuthAction = function() {
    if (auth.currentUser) {
      signOut(auth).then(() => alert('Sesión de administrador cerrada.'));
    } else {
      document.getElementById('authModal').classList.add('open');
    }
  };

  window.closeAuthModal = function() {
    document.getElementById('authModal').classList.remove('open');
    document.getElementById('auth-email').value = '';
    document.getElementById('auth-pass').value = '';
  };

  window.submitLogin = function() {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const btn = document.getElementById('btnSubmitAuth');

    if (!email || !pass) { alert('Completa los campos.'); return; }
    btn.disabled = true; btn.textContent = "Validando...";

    signInWithEmailAndPassword(auth, email, pass)
      .then(() => {
        closeAuthModal();
      })
      .catch((error) => {
        alert('Credenciales incorrectas de administrador.');
        console.error(error);
      })
      .finally(() => {
        btn.disabled = false; btn.textContent = "Ingresar";
      });
  };

  window.showSection = function(name, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('sec-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'calendar') renderCalendar();
    if (name === 'members') renderMembers();
  };

  // --- LOGICA DE MIEMBROS & FIRESTORE ---
  window.renderMembers = function() {
    const grid = document.getElementById('membersGrid');
    if(!grid) return;
    grid.innerHTML = '';
    
    window.membersList.forEach(m => {
      const card = document.createElement('div');
      card.className = 'member-card';
      card.id = 'card-' + m.id;
      const roleClass = { leader:'role-leader', officer:'role-officer', member:'role-member' }[m.role] || 'role-member';
      const roleLabel = { leader:'Líder', officer:'Oficial', member:'Miembro' }[m.role] || 'Miembro';
      const initials = m.username.slice(0,2).toUpperCase();
      
      const adminButtons = document.body.classList.contains('is-admin') 
        ? `<div style="display:flex;gap:0.5rem;margin-top:1rem" class="admin-only">
             <button class="btn btn-outline" style="font-size:0.68rem;padding:0.4rem 0.8rem" onclick="openPJModal('${m.id}')">+ Agregar PJ</button>
             <button class="btn btn-danger" onclick="removeMember('${m.id}')">Eliminar jugador</button>
           </div>`
        : '';

      card.innerHTML = `
        <div class="member-header" onclick="toggleCard('${m.id}')">
          <div class="member-avatar">${initials}</div>
          <div>
            <div class="member-name">${m.username}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.1rem">${m.pjs.length} personaje${m.pjs.length !== 1 ? 's' : ''}</div>
          </div>
          <span class="member-role ${roleClass}">${roleLabel}</span>
          <span class="expand-icon">&#9660;</span>
        </div>
        <div class="member-body">
          <div id="pjlist-${m.id}">${renderPJList(m)}</div>
          ${adminButtons}
        </div>
      `;
      grid.appendChild(card);
    });
    updateStatsOnly();
  };

  window.renderPJList = function(m) {
    if (!m.pjs || !m.pjs.length) return '<p style="color:var(--text-muted);font-style:italic;font-size:0.8rem;padding:0.3rem 0">Sin personajes registrados.</p>';
    const isSharedAdmin = document.body.classList.contains('is-admin');
    
    return m.pjs.map(pj => `
      <div class="pj-item">
        <div class="pj-header">
          <div>
            <span class="pj-name">${pj.name}</span>
            <span class="pj-class"> - ${pj.cls}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem">
            <span class="pj-level">Nv ${pj.level}</span>
            ${isSharedAdmin ? `<button class="btn btn-danger admin-only" onclick="removePJ('${m.id}','${pj.id}')">x</button>` : ''}
          </div>
        </div>
        <div class="pj-oficios">
          ${pj.oficios.map(o => `<span class="oficio-tag oficio-${o.type}">${o.name}</span>`).join('') || '<span style="font-size:0.7rem;color:var(--text-muted);font-style:italic">Sin oficios</span>'}
        </div>
      </div>
    `).join('');
  };

  window.toggleCard = function(id) {
    const card = document.getElementById('card-' + id);
    if(card) card.classList.toggle('open');
  };

  window.addMember = function() {
    const username = document.getElementById('inp-user').value.trim();
    const role = document.getElementById('inp-role').value;
    if (!username) { alert('Ingresa un nombre de usuario.'); return; }
    
    const newMember = { id: "m_" + Date.now(), username, role, pjs: [] };
    
    updateDoc(doc(db, "guild_data", "members"), {
      list: arrayUnion(newMember)
    }).then(() => {
      document.getElementById('inp-user').value = '';
    }).catch(err => alert("Error: Verifica las reglas de escritura en tu consola Firebase o inicia sesión como admin."));
  };

  window.removeMember = function(id) {
    if (!confirm('¿Eliminar este jugador y todos sus personajes?')) return;
    const target = window.membersList.find(m => m.id === id);
    if(!target) return;

    updateDoc(doc(db, "guild_data", "members"), {
      list: arrayRemove(target)
    });
  };

  window.removePJ = function(memberId, pjId) {
    const m = window.membersList.find(m => m.id === memberId);
    if (!m) return;
    
    const updatedPjs = m.pjs.filter(p => p.id !== pjId);
    const updatedList = window.membersList.map(member => {
      if(member.id === memberId) {
        return { ...member, pjs: updatedPjs };
      }
      return member;
    });

    updateDoc(doc(db, "guild_data", "members"), { list: updatedList });
  };

  // --- MODAL PJ ---
  window.openPJModal = function(memberId) {
    window.editingMemberId = memberId;
    window.tempOficios = [];
    document.getElementById('pj-name').value = '';
    document.getElementById('pj-level').value = '';
    document.getElementById('pj-oficios-tags').innerHTML = '';
    const m = window.membersList.find(m => m.id === memberId);
    document.getElementById('pjModalTitle').textContent = 'Agregar PJ para ' + m.username;
    document.getElementById('pjModal').classList.add('open');
  };

  window.closePJModal = function() {
    document.getElementById('pjModal').classList.remove('open');
    window.editingMemberId = null;
  };

  window.addOficioTag = function() {
    const sel = document.getElementById('pj-oficio-select');
    const [name, type] = sel.value.split('|');
    if (window.tempOficios.find(o => o.name === name)) return;
    window.tempOficios.push({ name, type });
    renderOficioTags();
  };

  window.renderOficioTags = function() {
    const container = document.getElementById('pj-oficios-tags');
    container.innerHTML = window.tempOficios.map((o, i) =>
      `<span class="selected-oficio" onclick="removeOficioTag(${i})" title="Clic para quitar">${o.name} ×</span>`
    ).join('');
  };

  window.removeOficioTag = function(i) {
    window.tempOficios.splice(i, 1);
    renderOficioTags();
  };

  window.savePJ = function() {
    const name = document.getElementById('pj-name').value.trim();
    const cls  = document.getElementById('pj-class').value;
    const level = parseInt(document.getElementById('pj-level').value) || 1;
    if (!name) { alert('Ingresa el nombre del personaje.'); return; }
    
    const updatedList = window.membersList.map(member => {
      if(member.id === window.editingMemberId) {
        const pjs = member.pjs || [];
        const newPj = { id: "pj_" + Date.now(), name, cls, level, oficios: [...window.tempOficios] };
        return { ...member, pjs: [...pjs, newPj] };
      }
      return member;
    });

    updateDoc(doc(db, "guild_data", "members"), { list: updatedList })
      .then(() => closePJModal());
  };

  // --- CALENDAR ---
  window.renderCalendar = function() {
    const label = document.getElementById('calMonthLabel');
    if(!label) return;
    label.textContent = window.MONTHS[window.currentMonth] + ' ' + window.currentYear;

    const wdays = document.getElementById('calWeekdays');
    wdays.innerHTML = window.WEEKDAYS.map(d => `<div class="weekday-label">${d}</div>`).join('');

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(window.currentYear, window.currentMonth, 1).getDay();
    const daysInMonth = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
    const today = new Date();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const events = window.eventsData[dateKey] || [];
      const isToday = today.getFullYear() === window.currentYear && today.getMonth() === window.currentMonth && today.getDate() === d;

      const cell = document.createElement('div');
      cell.className = 'cal-day' + (isToday ? ' today' : '') + (events.length ? ' has-event' : '');
      cell.innerHTML = `<div class="day-num">${d}</div>` +
        events.map(e => `<div class="day-event event-${e.type}">${e.desc}</div>`).join('');
      grid.appendChild(cell);
    }
    updateStatsOnly();
  };

  window.changeMonth = function(dir) {
    window.currentMonth += dir;
    if (window.currentMonth < 0)  { window.currentMonth = 11; window.currentYear--; }
    if (window.currentMonth > 11) { window.currentMonth = 0;  window.currentYear++; }
    renderCalendar();
  };

  window.addEvent = function() {
    const day  = parseInt(document.getElementById('inp-evDay').value);
    const type = document.getElementById('inp-evType').value;
    const desc = document.getElementById('inp-evDesc').value.trim();
    if (!day || !desc) { alert('Completa el día y la descripción.'); return; }
    
    const dateKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    
    const currentSchedule = { ...window.eventsData };
    if (!currentSchedule[dateKey]) currentSchedule[dateKey] = [];
    currentSchedule[dateKey].push({ desc, type });

    updateDoc(doc(db, "guild_data", "events"), { schedule: currentSchedule })
      .then(() => {
        document.getElementById('inp-evDay').value = '';
        document.getElementById('inp-evDesc').value = '';
      });
  };

  // --- SETTINGS ---
  window.saveSettings = function() {
    const name = document.getElementById('set-name').value.trim() || window.guildData.name;
    const level = parseInt(document.getElementById('set-level').value) || window.guildData.level;
    const server = document.getElementById('set-server').value.trim() || window.guildData.server;
    const desc = document.getElementById('set-desc').value.trim() || window.guildData.desc;

    updateDoc(doc(db, "guild_config", "los-perversos"), { name, level, server, desc })
      .then(() => alert('Configuración global guardada en Firestore.'));
  };

  function renderGuildHeader() {
    const titleContainer = document.getElementById('guildName');
    if(!titleContainer) return;
    if (window.guildData.name.includes('-')) {
      titleContainer.innerHTML = `${window.guildData.name.split('-')[0]}-<span>${window.guildData.name.split('-')[1]}</span>`;
    } else {
      titleContainer.textContent = window.guildData.name;
    }
    document.getElementById('guildServer').textContent = `Servidor: ${window.guildData.server} | Nivel de gremio: ${window.guildData.level}`;
    document.getElementById('guildDesc').textContent = window.guildData.desc;
  }

  function fillGuildSettingsForm() {
    const el = document.getElementById('set-name');
    if(!el) return;
    el.value = window.guildData.name;
    document.getElementById('set-level').value = window.guildData.level;
    document.getElementById('set-server').value = window.guildData.server;
    document.getElementById('set-desc').value = window.guildData.desc;
  }

  function updateStatsOnly() {
    const su = document.getElementById('statUsers');
    if(!su) return;
    su.textContent = window.membersList.length;
    document.getElementById('statPJs').textContent = window.membersList.reduce((a,m) => a + (m.pjs ? m.pjs.length : 0), 0);
    const monthKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}`;
    const evCount = Object.keys(window.eventsData).filter(k => k.startsWith(monthKey)).reduce((a, k) => a + window.eventsData[k].length, 0);
    document.getElementById('statEvents').textContent = evCount;
  }

  // Cerrar modal al clickear fuera
  document.getElementById('pjModal').addEventListener('click', function(e) { if (e.target === this) closePJModal(); });
  document.getElementById('authModal').addEventListener('click', function(e) { if (e.target === this) closeAuthModal(); });
</script>
