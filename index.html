<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gremio Los Perversos</title>
  <style>
    :root {
      --bg-dark: #121214;
      --bg-card: #1a1a1e;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #2e2e35;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text); padding: 2rem 1rem; }
    .container { max-width: 1000px; margin: 0 auto; }

    /* Header & Badges */
    header { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1.5rem; position: relative; }
    h1 span { color: var(--primary); }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.3rem; }
    .desc { margin-top: 0.8rem; font-style: italic; color: #d1d5db; }
    
    .auth-zone { position: absolute; top: 1.5rem; right: 1.5rem; display: flex; align-items: center; gap: 0.8rem; }
    .badge { padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
    .badge-guest { background: #374151; color: #e5e7eb; }
    .badge-admin { background: #065f46; color: #34d399; }
    .hidden { display: none !important; }

    /* Stats Dashboard */
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1rem; border-radius: 10px; text-align: center; }
    .stat-card div:first-child { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
    .stat-card div:last-child { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-top: 0.2rem; }

    /* Navigation tabs */
    .nav-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
    .nav-tab { background: transparent; border: none; color: var(--text-muted); padding: 0.6rem 1.2rem; cursor: pointer; font-size: 1rem; font-weight: 500; border-radius: 6px; transition: 0.2s; }
    .nav-tab:hover { color: var(--text); background: #252529; }
    .nav-tab.active { color: #fff; background: var(--primary); }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    /* Grids & Cards */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .member-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: 0.2s; }
    .member-header { padding: 1rem; display: flex; align-items: center; gap: 0.8rem; cursor: pointer; position: relative; }
    .member-avatar { width: 40px; height: 40px; background: #312e81; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #c7d2fe; }
    .member-name { font-weight: 600; font-size: 1.05rem; }
    .member-role { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; margin-left: auto; margin-right: 2rem; font-weight: bold; }
    .role-leader { background: #7f1d1d; color: #fca5a5; }
    .role-officer { background: #14532d; color: #86efac; }
    .role-member { background: #1e3a8a; color: #bfdbfe; }
    .expand-icon { position: absolute; right: 1rem; color: var(--text-muted); transition: 0.3s; }
    
    .member-body { max-height: 0; overflow: hidden; padding: 0 1rem; transition: max-height 0.3s ease-out; background: #151518; }
    .member-card.open .member-body { max-height: 1000px; padding: 1rem; border-top: 1px solid var(--border); }
    .member-card.open .expand-icon { transform: rotate(180deg); }

    /* PJs Inside Card */
    .pj-item { background: var(--bg-card); padding: 0.8rem; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 0.6rem; }
    .pj-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .pj-name { font-weight: 600; color: #fff; }
    .pj-class { color: var(--text-muted); font-size: 0.9rem; }
    .pj-level { background: #374151; font-size: 0.75rem; padding: 0.1rem 0.4rem; border-radius: 4px; }
    .pj-oficios { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
    .oficio-tag { font-size: 0.68rem; padding: 0.15rem 0.4rem; border-radius: 3px; background: #4b5563; }

    /* Calendar Grid */
    .cal-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: var(--text-muted); margin-bottom: 0.5rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day { background: var(--bg-card); border: 1px solid var(--border); min-height: 85px; padding: 0.4rem; border-radius: 4px; position: relative; }
    .cal-day.empty { background: transparent; border: none; }
    .cal-day.today { border-color: var(--primary); background: #241e35; }
    .day-num { font-weight: bold; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .day-event { font-size: 0.68rem; padding: 0.1rem 0.3rem; border-radius: 2px; margin-bottom: 2px; white-content: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-almanax { background: #065f46; color: #a7f3d0; }
    .event-dungeon { background: #1e3a8a; color: #bfdbfe; }

    /* Forms & Buttons */
    .form-inline { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background: var(--bg-card); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    input, select, textarea { background: #252529; border: 1px solid var(--border); color: #fff; padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 0.95rem; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }
    .form-inline input, .form-inline select { width: auto; flex: 1; }
    
    .btn { background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn:hover { background: var(--primary-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: #252529; }
    .btn-danger { background: #991b1b; font-size: 0.75rem; padding: 0.3rem 0.6rem; }
    .btn-danger:hover { background: var(--danger); }

    /* Modals */
    .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100; }
    .modal.open { opacity: 1; pointer-events: auto; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; width: 100%; max-width: 400px; position: relative; }
    .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; color: #fff; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: transparent; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; }
    .selected-oficio { display: inline-block; background: var(--primary); font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; margin: 0.2rem; cursor: pointer; }

    /* Admin-only visibility toggles if class isn't controlled by JS properly */
    body:not(.is-admin) .admin-only { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Encabezado del Gremio -->
  <header>
    <h1 id="guildName">Cargando...</h1>
    <div id="guildServer" class="subtitle">Servidor: -- | Nivel: --</div>
    <p id="guildDesc" class="desc">...</p>
    
    <div class="auth-zone">
      <span id="authBadgeGuest" class="badge badge-guest">Modo Invitado</span>
      <span id="authBadgeAdmin" class="badge badge-admin hidden">Administrador</span>
      <button id="btnAuthAction" class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;" onclick="handleAuthAction()">Entrar</button>
    </div>
  </header>

  <!-- Panel de Estadísticas Breves -->
  <div class="stats-bar">
    <div class="stat-card"><div id="statUsers">0</div><div>Jugadores</div></div>
    <div class="stat-card"><div id="statPJs">0</div><div>Personajes</div></div>
    <div class="stat-card"><div id="statEvents">0</div><div>Eventos Mes</div></div>
  </div>

  <!-- Pestañas de Navegación -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('members', this)">Miembros</button>
    <button class="nav-tab" onclick="showSection('calendar', this)">Almanax / Eventos</button>
    <button class="nav-tab admin-only" onclick="showSection('settings', this)">Configuración</button>
  </div>

  <!-- SECCIÓN MIEMBROS -->
  <div id="sec-members" class="section active">
    <!-- Panel Agregar Miembro (Sólo Admin) -->
    <div class="form-inline admin-only">
      <input type="text" id="inp-user" placeholder="Nombre de usuario del jugador">
      <select id="inp-role">
        <option value="member">Miembro</option>
        <option value="officer">Oficial</option>
        <option value="leader">Líder</option>
      </select>
      <button class="btn" onclick="addMember()">+ Registrar Miembro</button>
    </div>
    
    <!-- Grid Dinámico de Miembros -->
    <div id="membersGrid" class="grid"></div>
  </div>

  <!-- SECCIÓN CALENDARIO -->
  <div id="sec-calendar" class="section">
    <div class="cal-controls">
      <button class="btn btn-outline" onclick="changeMonth(-1)">◀ Anterior</button>
      <h2 id="calMonthLabel" style="font-size: 1.2rem;">Mes Año</h2>
      <button class="btn btn-outline" onclick="changeMonth(1)">Siguiente ▶</button>
    </div>

    <div id="calWeekdays" class="cal-weekdays"></div>
    <div id="calGrid" class="cal-grid"></div>

    <!-- Agregar Evento al Calendario (Sólo Admin) -->
    <div class="form-inline admin-only" style="margin-top: 1.5rem;">
      <input type="number" id="inp-evDay" min="1" max="31" placeholder="Día" style="width: 70px; flex: initial;">
      <select id="inp-evType" style="width: 140px; flex: initial;">
        <option value="almanax">Almanax</option>
        <option value="dungeon">Mazmorra / Gremio</option>
      </select>
      <input type="text" id="inp-evDesc" placeholder="Descripción del evento">
      <button class="btn" onclick="addEvent()">Programar Día</button>
    </div>
  </div>

  <!-- SECCIÓN CONFIGURACIÓN (Sólo Admin) -->
  <div id="sec-settings" class="section admin-only">
    <div style="background: var(--bg-card); padding: 1.5rem; border-radius: 10px; border: 1px solid var(--border); max-width: 500px;">
      <h3 style="margin-bottom: 1rem;">Ajustes Globales del Gremio</h3>
      <div class="form-group">
        <label>Nombre del Gremio (Usa un guion '-' para estilizar en dos colores)</label>
        <input type="text" id="set-name">
      </div>
      <div class="form-group">
        <label>Servidor</label>
        <input type="text" id="set-server">
      </div>
      <div class="form-group">
        <label>Nivel de Gremio</label>
        <input type="number" id="set-level">
      </div>
      <div class="form-group">
        <label>Descripción / Mensaje del Día</label>
        <textarea id="set-desc" rows="3"></textarea>
      </div>
      <button class="btn" onclick="saveSettings()">Guardar en la Nube</button>
    </div>
  </div>

</div>

<!-- MODAL LOGIN (ADMINISTRADOR) -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeAuthModal()">&times;</button>
    <div class="modal-title">Panel de Administración</div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="auth-email" placeholder="admin@gremio.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="auth-pass" placeholder="••••••••">
    </div>
    <button id="btnSubmitAuth" class="btn" style="width: 100%; margin-top: 0.5rem;" onclick="submitLogin()">Ingresar</button>
  </div>
</div>

<!-- MODAL PARA AGREGAR PERSONAJES (PJ) -->
<div id="pjModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closePJModal()">&times;</button>
    <div id="pjModalTitle" class="modal-title">Agregar Personaje</div>
    
    <div class="form-group">
      <label>Nombre del PJ</label>
      <input type="text" id="pj-name" placeholder="Ej: Atormentador">
    </div>
    <div class="form-group">
      <label>Clase</label>
      <select id="pj-class">
        <option value="Yopuka">Yopuka</option><option value="Ocra">Ocra</option>
        <option value="Aniripsa">Aniripsa</option><option value="Feca">Feca</option>
        <option value="Sacrógrito">Sacrógrito</option><option value="Sadida">Sadida</option>
        <option value="Osamodas">Osamodas</option><option value="Enutrof">Enutrof</option>
        <option value="Sram">Sram</option><option value="Xelor">Xelor</option>
        <option value="Pandawa">Pandawa</option><option value="Timador">Timador</option>
      </select>
    </div>
    <div class="form-group">
      <label>Nivel</label>
      <input type="number" id="pj-level" min="1" max="200" placeholder="200">
    </div>
    <div class="form-group">
      <label>Oficios (Haz clic para agregar)</label>
      <select id="pj-oficio-select" onchange="addOficioTag()">
        <option value="" disabled selected>-- Elige un oficio --</option>
        <option value="Alquimista|gather">Alquimista</option>
        <option value="Campesino|gather">Campesino</option>
        <option value="Leñador|gather">Leñador</option>
        <option value="Minero|gather">Minero</option>
        <option value="Joyero|craft">Joyero</option>
        <option value="Sastre|craft">Sastre</option>
        <option value="Zapatero|craft">Zapatero</option>
        <option value="Forjador|craft">Forjador</option>
      </select>
      <div id="pj-oficios-tags" style="margin-top: 0.5rem;"></div>
    </div>
    <button class="btn" style="width: 100%; margin-top: 0.5rem;" onclick="savePJ()">Guardar Personaje</button>
  </div>
</div>

<!-- FIREBASE SDK v12 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, updateDoc, setDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  // Tu configuración oficial de Firebase para Miembros
  const firebaseConfig = {
    apiKey: "AIzaSyD-ZARNy4qlxb8b5p26-DcuHQEw3BSn-oE",
    authDomain: "miembros-c2d72.firebaseapp.com",
    projectId: "miembros-c2d72",
    storageBucket: "miembros-c2d72.firebasestorage.app",
    messagingSenderId: "489865592759",
    appId: "1:489865592759:web:1fb67cf15858e2639cf232",
    measurementId: "G-1W6NPV7X03"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // --- ESTADO EN MEMORIA DE LA APP ---
  window.MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  window.WEEKDAYS = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  
  window.guildData = { name: 'Los-Perversos', level: 1, server: 'Cargando...', desc: '...' };
  window.membersList = [];
  window.eventsData = {};

  window.currentYear = new Date().getFullYear();
  window.currentMonth = new Date().getMonth();
  window.editingMemberId = null;
  window.tempOficios = [];

  // --- CONTROL DE ARRANQUE SEGURO (ESPERAR AL DOM) ---
  document.addEventListener("DOMContentLoaded", () => {
    
    // 1. Escuchar metadatos del gremio
    onSnapshot(doc(db, "guild_config", "los-perversos"), (docSnap) => {
      if (docSnap.exists()) {
        window.guildData = docSnap.data();
      } else {
        setDoc(doc(db, "guild_config", "los-perversos"), window.guildData);
      }
      renderGuildHeader();
      fillGuildSettingsForm();
    });

    // 2. Escuchar lista de miembros
    onSnapshot(doc(db, "guild_data", "members"), (docSnap) => {
      window.membersList = docSnap.exists() ? (docSnap.data().list || []) : [];
      renderMembers();
    });

    // 3. Escuchar eventos / Almanax
    onSnapshot(doc(db, "guild_data", "events"), (docSnap) => {
      window.eventsData = docSnap.exists() ? (docSnap.data().schedule || {}) : {};
      const calSec = document.getElementById('sec-calendar');
      if (calSec && calSec.classList.contains('active')) {
        renderCalendar();
      } else {
        updateStatsOnly();
      }
    });

    // 4. Monitoreo de Autenticación
    onAuthStateChanged(auth, (user) => {
      const bGuest = document.getElementById('authBadgeGuest');
      const bAdmin = document.getElementById('authBadgeAdmin');
      const bAction = document.getElementById('btnAuthAction');

      if (user) {
        document.body.classList.add('is-admin');
        if(bGuest) bGuest.classList.add('hidden');
        if(bAdmin) bAdmin.classList.remove('hidden');
        if(bAction) bAction.textContent = "Salir";
      } else {
        document.body.classList.remove('is-admin');
        if(bAdmin) bAdmin.classList.add('hidden');
        if(bGuest) bGuest.classList.remove('hidden');
        if(bAction) bAction.textContent = "Entrar";
      }
      renderMembers();
    });

    // 5. Modales (Cerrar al hacer click fuera)
    const pModal = document.getElementById('pjModal');
    const aModal = document.getElementById('authModal');
    if(pModal) pModal.addEventListener('click', function(e) { if (e.target === this) closePJModal(); });
    if(aModal) aModal.addEventListener('click', function(e) { if (e.target === this) closeAuthModal(); });
  });

  // --- FUNCIONES EXPUESTAS AL AMBITO GLOBAL ---
  window.handleAuthAction = function() {
    if (auth.currentUser) {
      signOut(auth).then(() => alert('Sesión de administrador cerrada.'));
    } else {
      const am = document.getElementById('authModal');
      if(am) am.classList.add('open');
    }
  };

  window.closeAuthModal = function() {
    const am = document.getElementById('authModal');
    if(am) am.classList.remove('open');
    const ae = document.getElementById('auth-email');
    const ap = document.getElementById('auth-pass');
    if(ae) ae.value = '';
    if(ap) ap.value = '';
  };

  window.submitLogin = function() {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const btn = document.getElementById('btnSubmitAuth');

    if (!email || !pass) { alert('Completa los campos.'); return; }
    btn.disabled = true; btn.textContent = "Validando...";

    signInWithEmailAndPassword(auth, email, pass)
      .then(() => {
        closeAuthModal();
      })
      .catch((error) => {
        alert('Credenciales incorrectas de administrador.');
        console.error(error);
      })
      .finally(() => {
        btn.disabled = false; btn.textContent = "Ingresar";
      });
  };

  window.showSection = function(name, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    
    const targetSec = document.getElementById('sec-' + name);
    if(targetSec) targetSec.classList.add('active');
    if(btn) btn.classList.add('active');
    
    if (name === 'calendar') renderCalendar();
    if (name === 'members') renderMembers();
  };

  // --- LOGICA DE MIEMBROS & FIRESTORE ---
  window.renderMembers = function() {
    const grid = document.getElementById('membersGrid');
    if(!grid) return;
    grid.innerHTML = '';
    
    window.membersList.forEach(m => {
      const card = document.createElement('div');
      card.className = 'member-card';
      card.id = 'card-' + m.id;
      const roleClass = { leader:'role-leader', officer:'role-officer', member:'role-member' }[m.role] || 'role-member';
      const roleLabel = { leader:'Líder', officer:'Oficial', member:'Miembro' }[m.role] || 'Miembro';
      const initials = m.username.slice(0,2).toUpperCase();
      
      const adminButtons = document.body.classList.contains('is-admin') 
        ? `<div style="display:flex;gap:0.5rem;margin-top:1rem" class="admin-only">
             <button class="btn btn-outline" style="font-size:0.68rem;padding:0.4rem 0.8rem" onclick="openPJModal('${m.id}')">+ Agregar PJ</button>
             <button class="btn btn-danger" onclick="removeMember('${m.id}')">Eliminar jugador</button>
           </div>`
        : '';

      card.innerHTML = `
        <div class="member-header" onclick="toggleCard('${m.id}')">
          <div class="member-avatar">${initials}</div>
          <div>
            <div class="member-name">${m.username}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.1rem">${m.pjs.length} personaje${m.pjs.length !== 1 ? 's' : ''}</div>
          </div>
          <span class="member-role ${roleClass}">${roleLabel}</span>
          <span class="expand-icon">&#9660;</span>
        </div>
        <div class="member-body">
          <div id="pjlist-${m.id}">${renderPJList(m)}</div>
          ${adminButtons}
        </div>
      `;
      grid.appendChild(card);
    });
    updateStatsOnly();
  };

  window.renderPJList = function(m) {
    if (!m.pjs || !m.pjs.length) return '<p style="color:var(--text-muted);font-style:italic;font-size:0.8rem;padding:0.3rem 0">Sin personajes registrados.</p>';
    const isSharedAdmin = document.body.classList.contains('is-admin');
    
    return m.pjs.map(pj => `
      <div class="pj-item">
        <div class="pj-header">
          <div>
            <span class="pj-name">${pj.name}</span>
            <span class="pj-class"> - ${pj.cls}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem">
            <span class="pj-level">Nv ${pj.level}</span>
            ${isSharedAdmin ? `<button class="btn btn-danger admin-only" onclick="removePJ('${m.id}','${pj.id}')">x</button>` : ''}
          </div>
        </div>
        <div class="pj-oficios">
          ${pj.oficios.map(o => `<span class="oficio-tag oficio-${o.type}">${o.name}</span>`).join('') || '<span style="font-size:0.7rem;color:var(--text-muted);font-style:italic">Sin oficios</span>'}
        </div>
      </div>
    `).join('');
  };

  window.toggleCard = function(id) {
    const card = document.getElementById('card-' + id);
    if(card) card.classList.toggle('open');
  };

  window.addMember = function() {
    const username = document.getElementById('inp-user').value.trim();
    const role = document.getElementById('inp-role').value;
    if (!username) { alert('Ingresa un nombre de usuario.'); return; }
    
    const newMember = { id: "m_" + Date.now(), username, role, pjs: [] };
    
    updateDoc(doc(db, "guild_data", "members"), {
      list: arrayUnion(newMember)
    }).then(() => {
      document.getElementById('inp-user').value = '';
    }).catch(err => alert("Error: Verifica las reglas de escritura en tu consola Firebase o inicia sesión como admin."));
  };

  window.removeMember = function(id) {
    if (!confirm('¿Eliminar este jugador y todos sus personajes?')) return;
    const target = window.membersList.find(m => m.id === id);
    if(!target) return;

    updateDoc(doc(db, "guild_data", "members"), {
      list: arrayRemove(target)
    });
  };

  window.removePJ = function(memberId, pjId) {
    const m = window.membersList.find(m => m.id === memberId);
    if (!m) return;
    
    const updatedPjs = m.pjs.filter(p => p.id !== pjId);
    const updatedList = window.membersList.map(member => {
      if(member.id === memberId) {
        return { ...member, pjs: updatedPjs };
      }
      return member;
    });

    updateDoc(doc(db, "guild_data", "members"), { list: updatedList });
  };

  // --- MODAL PJ ---
  window.openPJModal = function(memberId) {
    window.editingMemberId = memberId;
    window.tempOficios = [];
    document.getElementById('pj-name').value = '';
    document.getElementById('pj-level').value = '';
    document.getElementById('pj-oficios-tags').innerHTML = '';
    const m = window.membersList.find(m => m.id === memberId);
    document.getElementById('pjModalTitle').textContent = 'Agregar PJ para ' + m.username;
    
    const pm = document.getElementById('pjModal');
    if(pm) pm.classList.add('open');
  };

  window.closePJModal = function() {
    const pm = document.getElementById('pjModal');
    if(pm) pm.classList.remove('open');
    window.editingMemberId = null;
  };

  window.addOficioTag = function() {
    const sel = document.getElementById('pj-oficio-select');
    if(!sel) return;
    const [name, type] = sel.value.split('|');
    if (window.tempOficios.find(o => o.name === name)) return;
    window.tempOficios.push({ name, type });
    renderOficioTags();
  };

  window.renderOficioTags = function() {
    const container = document.getElementById('pj-oficios-tags');
    if(!container) return;
    container.innerHTML = window.tempOficios.map((o, i) =>
      `<span class="selected-oficio" onclick="removeOficioTag(${i})" title="Clic para quitar">${o.name} ×</span>`
    ).join('');
  };

  window.removeOficioTag = function(i) {
    window.tempOficios.splice(i, 1);
    renderOficioTags();
  };

  window.savePJ = function() {
    const name = document.getElementById('pj-name').value.trim();
    const cls  = document.getElementById('pj-class').value;
    const level = parseInt(document.getElementById('pj-level').value) || 1;
    if (!name) { alert('Ingresa el nombre del personaje.'); return; }
    
    const updatedList = window.membersList.map(member => {
      if(member.id === window.editingMemberId) {
        const pjs = member.pjs || [];
        const newPj = { id: "pj_" + Date.now(), name, cls, level, oficios: [...window.tempOficios] };
        return { ...member, pjs: [...pjs, newPj] };
      }
      return member;
    });

    updateDoc(doc(db, "guild_data", "members"), { list: updatedList })
      .then(() => closePJModal());
  };

  // --- CALENDAR ---
  window.renderCalendar = function() {
    const label = document.getElementById('calMonthLabel');
    if(!label) return;
    label.textContent = window.MONTHS[window.currentMonth] + ' ' + window.currentYear;

    const wdays = document.getElementById('calWeekdays');
    if(wdays) wdays.innerHTML = window.WEEKDAYS.map(d => `<div class="weekday-label">${d}</div>`).join('');

    const grid = document.getElementById('calGrid');
    if(!grid) return;
    grid.innerHTML = '';

    const firstDay = new Date(window.currentYear, window.currentMonth, 1).getDay();
    const daysInMonth = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
    const today = new Date();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const events = window.eventsData[dateKey] || [];
      const isToday = today.getFullYear() === window.currentYear && today.getMonth() === window.currentMonth && today.getDate() === d;

      const cell = document.createElement('div');
      cell.className = 'cal-day' + (isToday ? ' today' : '') + (events.length ? ' has-event' : '');
      cell.innerHTML = `<div class="day-num">${d}</div>` +
        events.map(e => `<div class="day-event event-${e.type}">${e.desc}</div>`).join('');
      grid.appendChild(cell);
    }
    updateStatsOnly();
  };

  window.changeMonth = function(dir) {
    window.currentMonth += dir;
    if (window.currentMonth < 0)  { window.currentMonth = 11; window.currentYear--; }
    if (window.currentMonth > 11) { window.currentMonth = 0;  window.currentYear++; }
    renderCalendar();
  };

  window.addEvent = function() {
    const day  = parseInt(document.getElementById('inp-evDay').value);
    const type = document.getElementById('inp-evType').value;
    const desc = document.getElementById('inp-evDesc').value.trim();
    if (!day || !desc) { alert('Completa el día y la descripción.'); return; }
    
    const dateKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    
    const currentSchedule = { ...window.eventsData };
    if (!currentSchedule[dateKey]) currentSchedule[dateKey] = [];
    currentSchedule[dateKey].push({ desc, type });

    updateDoc(doc(db, "guild_data", "events"), { schedule: currentSchedule })
      .then(() => {
        document.getElementById('inp-evDay').value = '';
        document.getElementById('inp-evDesc').value = '';
      });
  };

  // --- SETTINGS ---
  window.saveSettings = function() {
    const name = document.getElementById('set-name').value.trim() || window.guildData.name;
    const level = parseInt(document.getElementById('set-level').value) || window.guildData.level;
    const server = document.getElementById('set-server').value.trim() || window.guildData.server;
    const desc = document.getElementById('set-desc').value.trim() || window.guildData.desc;

    updateDoc(doc(db, "guild_config", "los-perversos"), { name, level, server, desc })
      .then(() => alert('Configuración global guardada en Firestore.'));
  };

  function renderGuildHeader() {
    const titleContainer = document.getElementById('guildName');
    if(!titleContainer) return;
    if (window.guildData.name.includes('-')) {
      titleContainer.innerHTML = `${window.guildData.name.split('-')[0]}-<span>${window.guildData.name.split('-')[1]}</span>`;
    } else {
      titleContainer.textContent = window.guildData.name;
    }
    const gs = document.getElementById('guildServer');
    const gd = document.getElementById('guildDesc');
    if(gs) gs.textContent = `Servidor: ${window.guildData.server} | Nivel de gremio: ${window.guildData.level}`;
    if(gd) gd.textContent = window.guildData.desc;
  }

  function fillGuildSettingsForm() {
    const el = document.getElementById('set-name');
    if(!el) return;
    el.value = window.guildData.name;
    document.getElementById('set-level').value = window.guildData.level;
    document.getElementById('set-server').value = window.guildData.server;
    document.getElementById('set-desc').value = window.guildData.desc;
  }

  function updateStatsOnly() {
    const su = document.getElementById('statUsers');
    const sp = document.getElementById('statPJs');
    const se = document.getElementById('statEvents');
    if(!su || !sp || !se) return;
    
    su.textContent = window.membersList.length;
    sp.textContent = window.membersList.reduce((a,m) => a + (m.pjs ? m.pjs.length : 0), 0);
    const monthKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}`;
    const evCount = Object.keys(window.eventsData).filter(k => k.startsWith(monthKey)).reduce((a, k) => a + window.eventsData[k].length, 0);
    se.textContent = evCount;
  }
</script>
</body>
</html>
