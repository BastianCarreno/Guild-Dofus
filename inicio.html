<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Guild Config</title>
    <!-- MANTENIENDO EXACTAMENTE TU ESTILO ORIGINAL -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #2a2a35;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        h2 {
            margin-top: 0;
            color: #4dadf7;
            border-bottom: 2px solid #3b3b4f;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #ced4da;
        }
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #495057;
            background-color: #1e1e24;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        button {
            background-color: #339af0;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #228be6;
        }
        .member-card {
            background-color: #1e1e24;
            padding: 10px;
            border-left: 4px solid #51cf66;
            margin-bottom: 8px;
            border-radius: 0 4px 4px 0;
        }
        .loading {
            text-align: center;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- BLOQUE 1: FORMULARIO DE CONFIGURACIÓN -->
    <div class="container">
        <h2>Configuración de la Guild (los-perversos)</h2>
        <div id="settings-form">
            <div class="form-group">
                <label for="guild-name">Nombre de la Guild:</label>
                <input type="text" id="guild-name" placeholder="Ej: Los Perversos">
            </div>
            <div class="form-group">
                <label for="guild-level">Nivel:</label>
                <input type="number" id="guild-level" placeholder="Ej: 123">
            </div>
            <div class="form-group">
                <label for="guild-server">Servidor:</label>
                <input type="text" id="guild-server" placeholder="Ej: Server 1">
            </div>
            <div class="form-group">
                <label for="guild-desc">Descripción:</label>
                <textarea id="guild-desc" placeholder="Escribe una breve descripción..."></textarea>
            </div>
            <button onclick="window.saveSettings()">Guardar Configuración</button>
        </div>
    </div>

    <!-- BLOQUE 2: LISTA DE MIEMBROS -->
    <div class="container">
        <h2>Miembros del Clan</h2>
        <div id="members-container">
            <p class="loading">Cargando lista de miembros...</p>
        </div>
    </div>

    <!-- LÓGICA DE BASE DE DATOS OPTIMIZADA CON SUPABASE -->
    <script type="module">
        // Importamos la librería de Supabase mediante CDN oficial (ESM)
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // ========================================================
        //  REEMPLAZA ESTO CON LOS DATOS DE TU PROYECTO SUPABASE
        // ========================================================
        const SUPABASE_URL = 'https://mvhbzwcflcddtqiwljsf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_5eh73ojnkKuMnYWv06REfA_dUL2ZvlW';

        // Inicializar el cliente global de Supabase
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        /**
         * FUNCIÓN DE CARGA INICIAL CONTROLADA (Una única petición limpia)
         */
        async function inicializarAplicacion() {
            try {
                // --- 1. LEER CONFIGURACIÓN DE LA GUILD ---
                console.log("[DEBUG] Solicitando registro guild_config/los-perversos...");
                let { data: configData, error: configError } = await supabase
                    .from('guild_config')
                    .select('*')
                    .eq('id', '1')
                    .single();

                // Si no existe el registro, creamos la fila inicial por defecto
                if (configError || !configData) {
                    console.log("[DEBUG] El registro no existe en Supabase. Creando plantilla...");
                    const plantillaConfig = { id: '1', name: 'asd', level: 123, server: 'asd', desc: '' };
                    await supabase.from('guild_config').insert([plantillaConfig]);
                    renderConfig(plantillaConfig);
                } else {
                    console.log("[DEBUG] Datos de configuración cargados.");
                    renderConfig(configData);
                }

                // --- 2. LEER DATOS DE MIEMBROS ---
                console.log("[DEBUG] Solicitando registro guild_data/members...");
                let { data: membersData, error: membersError } = await supabase
                    .from('guild_data')
                    .select('*')
                    .eq('id', 'members')
                    .single();

                // Si no existe el registro de miembros, lo inicializamos vacío
                if (membersError || !membersData) {
                    console.log("[DEBUG] El registro de miembros no existe. Inicializando...");
                    const plantillaMiembros = { 
                        id: 'members',
                        lista: [{ nombre: "Líder Fundador", rango: "Líder" }], 
                        total: 1 
                    };
                    await supabase.from('guild_data').insert([plantillaMiembros]);
                    renderMembers(plantillaMiembros);
                } else {
                    console.log("[DEBUG] Datos de miembros cargados.");
                    renderMembers(membersData);
                }

            } catch (error) {
                console.error("[ERROR CRÍTICO] Error al cargar los datos desde Supabase:", error);
            }
        }

        /**
         * Pinta los datos existentes de la guild en los inputs de tu formulario
         */
        function renderConfig(data) {
            document.getElementById('guild-name').value = data.name || '';
            document.getElementById('guild-level').value = data.level || 0;
            document.getElementById('guild-server').value = data.server || '';
            document.getElementById('guild-desc').value = data.desc || '';
        }

        /**
         * Pinta la lista estructurada de miembros en el contenedor HTML
         */
        function renderMembers(data) {
            const container = document.getElementById('members-container');
            container.innerHTML = ""; // Remover texto de carga

            if (!data.lista || data.lista.length === 0) {
                container.innerHTML = "<p>No hay miembros registrados todavía.</p>";
                return;
            }

            data.lista.forEach(miembro => {
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `<strong>${miembro.nombre}</strong> - Rango: ${miembro.rango || 'Miembro'}`;
                container.appendChild(card);
            });
        }

        /**
         * FUNCIÓN ASÍNCRONA PARA GUARDAR (window.saveSettings)
         * Se ejecuta al pulsar el botón del formulario. Realiza un Upsert de forma segura.
         */
        window.saveSettings = async function() {
            console.log("[DEBUG Action] Iniciando guardado de datos...");
            
            const payload = {
                id: 'los-perversos', // Mantiene la clave única para actualizar siempre la misma fila
                name: document.getElementById('guild-name').value,
                level: parseInt(document.getElementById('guild-level').value, 10) || 0,
                server: document.getElementById('guild-server').value,
                desc: document.getElementById('guild-desc').value
            };

            console.log("[DEBUG Action] Enviando payload a Supabase:", payload);

            try {
                // .upsert inserta la fila si no existe o la actualiza si ya existe basándose en el 'id'
                const { error } = await supabase
                    .from('guild_config')
                    .upsert(payload);

                if (error) throw error;

                console.log("[DEBUG] Guardado exitoso.");
                alert("¡Configuración guardada correctamente en Supabase!");
            } catch (error) {
                console.error("[ERROR] No se pudo guardar la configuración:", error);
                alert("Hubo un error al intentar guardar los datos en el servidor.");
            }
        };

        // Arrancar la inicialización controlada al cargar la página
        inicializarAplicacion();

    </script>
</body>
</html>
