<script type="module">
    // 1. Importar los módulos oficiales necesarios (getDoc en lugar de onSnapshot)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firestore.js";

    // Tu configuración actual de Firebase (Mantenla tal y como la tienes)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_AUTH_DOMAIN",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_STORAGE_BUCKET",
        messagingSenderId: "TU_MESSAGING_SENDER_ID",
        appId: "TU_APP_ID"
    };

    // Inicializar base de datos
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Referencias a los documentos de tus logs
    const configDocRef = doc(db, 'guild_config', 'los-perversos');
    const membersDocRef = doc(db, 'guild_data', 'members');

    /**
     * REEMPLAZO DE LOS ANTERIORES 'onSnapshot' (Líneas 375 y 394 aprox.)
     * Usamos una función async con getDoc para que se ejecute UNA SOLA VEZ al cargar la página.
     */
    async function inicializarDatos() {
        try {
            // --- CARGA DE GUILD CONFIG ---
            const configSnap = await getDoc(configDocRef);
            
            if (!configSnap.exists()) {
                console.log("inicio.html:381 [DEBUG Snap] El documento los-perversos NO existe. Intentando crear plantilla inicial...");
                const plantillaInicial = { name: 'asd', level: 123, server: 'asd', desc: '' };
                await setDoc(configDocRef, plantillaInicial);
                
                // Llama aquí a tu función original que pintaba los datos en la interfaz antigua
                // Ejemplo: tuFuncionParaPintarConfig(plantillaInicial);
            } else {
                console.log("inicio.html:376 [DEBUG Snap] Datos de guild_config recibidos.");
                // Llama aquí a tu función original pasándole los datos existentes
                // Ejemplo: tuFuncionParaPintarConfig(configSnap.data());
            }

            // --- CARGA DE MIEMBROS ---
            const membersSnap = await getDoc(membersDocRef);

            if (!membersSnap.exists()) {
                console.log("inicio.html:398 [DEBUG Snap] No existe el documento guild_data/members. Intentando inicializar...");
                const plantillaMiembros = { lista: [], total: 0 };
                await setDoc(membersDocRef, plantillaMiembros);
                
                // Llama aquí a tu función original que pintaba los miembros
                // Ejemplo: tuFuncionParaPintarMiembros(plantillaMiembros);
            } else {
                console.log("inicio.html:394 [DEBUG Snap] Datos de miembros recibidos.");
                // Llama aquí a tu función original pasándole los miembros existentes
                // Ejemplo: tuFuncionParaPintarMiembros(membersSnap.data());
            }

        } catch (error) {
            console.error("[ERROR] Error al inicializar datos:", error);
        }
    }

    /**
     * TU FUNCIÓN DE GUARDADO (Línea 816 aprox.)
     * Modificada para guardar limpiamente sin disparar eventos de escucha asíncronos.
     */
    window.saveSettings = async function() {
        console.log("[DEBUG Action] Iniciando proceso de window.saveSettings()...");
        
        // Aquí recolectas los datos de tus inputs antiguos tal y como lo hacias
        const payload = {
            name: document.getElementById('guild-name').value, // Asegúrate de que use el ID de tu input antiguo
            level: parseInt(document.getElementById('guild-level').value, 10) || 0,
            server: document.getElementById('guild-server').value,
            desc: document.getElementById('guild-desc').value
        };

        console.log("inicio.html:816 [DEBUG Action] Payload a enviar a 'guild_config/los-perversos':", payload);

        try {
            // Guardamos con merge: true para proteger otros campos del documento antiguo
            await setDoc(configDocRef, payload, { merge: true });
            console.log("[DEBUG] Guardado completado con éxito.");
        } catch (error) {
            console.error("[ERROR] Error al guardar ajustes:", error);
        }
    };

    // Ejecutar la carga inicial controlada al abrir o refrescar la página
    inicializarDatos();

</script>
