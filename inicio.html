<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gremio Los Perversos - Gestión Interna</title>
  <style>
    :root {
      --bg-main: #121214;
      --bg-card: #1a1a1e;
      --bg-input: #26262b;
      --primary: #af81fd;
      --primary-hover: #9661f1;
      --accent: #ffb834;
      --text: #e1e1e6;
      --text-muted: #a8a8b3;
      --border: #29292e;
      --danger: #fe4a49;
      --success: #3ef7a7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text); padding-bottom: 3rem; }
    
    /* Header & Banner */
    .header-banner { background: linear-gradient(135deg, #1f1135 0%, #0d0d11 100%); border-bottom: 2px solid var(--border); padding: 2rem 1rem; text-align: center; position: relative; }
    .header-banner h1 { font-size: 2.5rem; color: #fff; margin-bottom: 0.5rem; letter-spacing: 1px; }
    .header-banner h1 span { color: var(--accent); }
    .header-banner p { color: var(--text-muted); font-size: 0.95rem; max-width: 600px; margin: 0.5rem auto 0; line-height: 1.4; }
    
    /* Auth Badges */
    .auth-container { position: absolute; top: 1rem; right: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .badge { padding: 0.25rem 0.6rem; font-size: 0.75rem; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
    .badge-guest { background-color: #38383e; color: var(--text-muted); }
    .badge-admin { background-color: rgba(255, 184, 52, 0.15); color: var(--accent); border: 1px solid var(--accent); }
    .hidden { display: none !important; }

    /* Layout & Container */
    .container { max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem; }
    
    /* Stats Row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--bg-card); border: 1px solid var(--border); padding: 1rem; border-radius: 6px; text-align: center; }
    .stat-box .num { font-size: 1.8rem; font-weight: bold; color: var(--primary); margin-bottom: 0.2rem; }
    .stat-box .label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Navigation Tabs */
    .nav-tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; }
    .nav-tab { background: none; border: none; color: var(--text-muted); padding: 0.75rem 1.2rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    /* Buttons & Forms */
    .btn { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 600; border-radius: 4px; cursor: pointer; transition: background 0.2s, border 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn:hover { background: #323238; }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #000; }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-danger { background: rgba(254, 74, 73, 0.1); border-color: rgba(254, 74, 73, 0.4); color: var(--danger); font-size: 0.75rem; padding: 0.25rem 0.5rem; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-outline { border-color: var(--primary); color: var(--primary); background: transparent; }
    .btn-outline:hover { background: rgba(175, 129, 253, 0.1); }

    .form-inline { display: flex; gap: 0.5rem; flex-wrap: wrap; background: var(--bg-card); padding: 1rem; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 1.5rem; align-items: center; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
    .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .form-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 0.55rem 0.75rem; border-radius: 4px; font-size: 0.9rem; outline: none; width: 100%; }
    .form-input:focus { border-color: var(--primary); }
    select.form-input { cursor: pointer; }

    /* Members Section */
    .members-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
    .member-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.2s; }
    .member-card:hover { border-color: #383842; }
    .member-header { padding: 1rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; user-select: none; position: relative; }
    .member-avatar { width: 40px; height: 40px; background: #2a2a30; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: var(--primary); border: 1px solid var(--border); }
    .member-name { font-weight: 600; font-size: 1.05rem; }
    .member-role { margin-left: auto; margin-right: 2.5rem; padding: 0.2rem 0.5rem; font-size: 0.7rem; font-weight: bold; border-radius: 3px; text-transform: uppercase; }
    .role-leader { background: rgba(255, 184, 52, 0.15); color: var(--accent); }
    .role-officer { background: rgba(175, 129, 253, 0.15); color: var(--primary); }
    .role-member { background: rgba(168, 168, 179, 0.1); color: var(--text-muted); }
    .expand-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.8rem; transition: transform 0.2s; }
    
    .member-body { display: none; padding: 0 1rem 1rem 4rem; border-top: 1px solid rgba(255,255,255,0.02); background: rgba(0,0,0,0.1); }
    .member-card.open .member-body { display: block; }
    .member-card.open .expand-icon { transform: translateY(-50%) rotate(180deg); }

    /* PJ Items inside members */
    .pj-item { padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .pj-item:last-child { border-bottom: none; }
    .pj-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
    .pj-name { font-weight: 600; font-size: 0.95rem; color: #fff; }
    .pj-class { font-size: 0.85rem; color: var(--text-muted); }
    .pj-level { font-size: 0.8rem; background: #26262b; padding: 0.1rem 0.4rem; border-radius: 3px; color: var(--accent); font-weight: 600; }
    .pj-oficios { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.2rem; }
    .oficio-tag { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 3px; font-weight: 600; }
    .oficio-reco { background: rgba(62, 247, 167, 0.12); color: var(--success); }
    .oficio-craft { background: rgba(175, 129, 253, 0.12); color: var(--primary); }

    /* Calendar Design */
    .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; background: var(--bg-card); padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.4rem; }
    .weekday-label { text-align: center; font-size: 0.75rem; font-weight: bold; color: var(--text-muted); padding: 0.5rem 0; text-transform: uppercase; }
    .cal-day { background: var(--bg-card); border: 1px solid var(--border); min-height: 80px; padding: 0.4rem; border-radius: 4px; display: flex; flex-direction: column; gap: 0.2rem; }
    .cal-day.empty { background: transparent; border-color: transparent; }
    .cal-day.today { border-color: var(--primary); background: linear-gradient(to bottom right, var(--bg-card), #1b1625); }
    .cal-day .day-num { font-size: 0.85rem; font-weight: bold; color: var(--text-muted); margin-bottom: 0.2rem; }
    .cal-day.today .day-num { color: var(--primary); }
    .day-event { font-size: 0.68rem; padding: 0.15rem 0.3rem; border-radius: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .event-almanax { background: rgba(255, 184, 52, 0.15); color: var(--accent); border-left: 2px solid var(--accent); }
    .event-gremio { background: rgba(175, 129, 253, 0.15); color: var(--primary); border-left: 2px solid var(--primary); }
    .event-mazmorra { background: rgba(62, 247, 167, 0.15); color: var(--success); border-left: 2px solid var(--success); }

    /* Modals structural style */
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 999; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 450px; border-radius: 8px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
    .modal-header h3 { font-size: 1.2rem; }
    .close-modal-btn { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; }
    .close-modal-btn:hover { color: #fff; }

    /* Oficios list creation area tags */
    .selected-oficios-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; min-height: 25px; }
    .selected-oficio { font-size: 0.72rem; background: #26262b; border: 1px solid var(--border); padding: 0.2rem 0.5rem; border-radius: 3px; color: var(--primary); cursor: pointer; }
    .selected-oficio:hover { border-color: var(--danger); color: var(--danger); }

    /* Hide admin features dynamically by body status */
    body:not(.is-admin) .admin-only { display: none !important; }
  </style>
</head>
<body>

  <!-- BANNER PRINCIPAL DE LA WEB -->
  <header class="header-banner">
    <div class="auth-container">
      <span id="authBadgeGuest" class="badge badge-guest">Modo Lectura</span>
      <span id="authBadgeAdmin" class="badge badge-admin hidden">Administrador</span>
      <button id="btnAuthAction" class="btn" style="padding: 0.25rem 0.6rem; font-size: 0.75rem;" onclick="window.handleAuthAction()">Entrar</button>
    </div>
    <h1 id="guildName">Los-<span>Perversos</span></h1>
    <p id="guildServer">Cargando datos del servidor...</p>
    <p id="guildDesc" style="font-style: italic; color: var(--text-muted); margin-top: 0.5rem;"></p>
  </header>

  <div class="container">
    
    <!-- CONTADORES GLOBALES (STATS) -->
    <section class="stats-row">
      <div class="stat-box">
        <div id="statUsers" class="num">0</div>
        <div class="label">Jugadores</div>
      </div>
      <div class="stat-box">
        <div id="statPJs" class="num">0</div>
        <div class="label">Personajes Totales</div>
      </div>
      <div class="stat-box">
        <div id="statEvents" class="num">0</div>
        <div class="label">Eventos del Mes</div>
      </div>
    </section>

    <!-- NAVEGACIÓN POR PESTAÑAS -->
    <nav class="nav-tabs">
      <button class="nav-tab active" onclick="window.showSection('members', this)">Miembros y Personajes</button>
      <button class="nav-tab" onclick="window.showSection('calendar', this)">Calendario / Almanax</button>
      <button class="nav-tab admin-only" onclick="window.showSection('settings', this)">Configuración Gremio</button>
    </nav>

    <!-- SECCIÓN 1: MIEMBROS -->
    <div id="sec-members" class="section active">
      <!-- Añadir Miembro (Solo visible para Administradores) -->
      <div class="form-inline admin-only">
        <span style="font-weight: 600; font-size: 0.9rem; color: var(--accent);">Nuevo Jugador:</span>
        <input type="text" id="inp-user" class="form-input" style="width: auto; flex: 1; min-width: 150px;" placeholder="Nombre de usuario (ej: El-Perverso)">
        <select id="inp-role" class="form-input" style="width: auto; min-width: 120px;">
          <option value="member">Miembro</option>
          <option value="officer">Oficial</option>
          <option value="leader">Líder</option>
        </select>
        <button class="btn btn-primary" onclick="window.addMember()">Registrar</button>
      </div>

      <!-- Cuadrícula dinámica de miembros -->
      <div id="membersGrid" class="members-grid">
        <p style="text-align: center; color: var(--text-muted); padding: 2rem;">Cargando lista de jugadores...</p>
      </div>
    </div>

    <!-- SECCIÓN 2: CALENDARIO -->
    <div id="sec-calendar" class="section">
      <!-- Añadir Eventos (Solo visible para Administradores) -->
      <div class="form-inline admin-only" style="gap: 0.75rem;">
        <span style="font-weight: 600; font-size: 0.9rem; color: var(--accent);">Programar Evento:</span>
        <input type="number" id="inp-evDay" class="form-input" style="width: 70px;" placeholder="Día" min="1" max="31">
        <select id="inp-evType" class="form-input" style="width: auto; min-width: 130px;">
          <option value="almanax">Almanax</option>
          <option value="gremio">Evento Gremio</option>
          <option value="mazmorra">Mazmorra / Drop</option>
        </select>
        <input type="text" id="inp-evDesc" class="form-input" style="width: auto; flex: 1; min-width: 150px;" placeholder="Descripción corta del evento">
        <button class="btn btn-primary" onclick="window.addEvent()">Añadir</button>
      </div>

      <!-- Calendario Grid -->
      <div class="calendar-controls">
        <button class="btn" onclick="window.changeMonth(-1)">&larr; Mes Anterior</button>
        <h2 id="calMonthLabel" style="font-size: 1.2rem; color: #fff;">-</h2>
        <button class="btn" onclick="window.changeMonth(1)">Mes Siguiente &rarr;</button>
      </div>
      <div id="calWeekdays" class="calendar-grid" style="margin-bottom: 0.2rem;"></div>
      <div id="calGrid" class="calendar-grid"></div>
    </div>

    <!-- SECCIÓN 3: CONFIGURACIÓN GLOBAL (Solo visible para Administradores) -->
    <div id="sec-settings" class="section admin-only">
      <div style="background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 6px;">
        <h2 style="font-size: 1.3rem; margin-bottom: 1.2rem; color: var(--accent);">Ajustes de Información Pública</h2>
        
        <div class="form-group">
          <label for="set-name">Nombre de la Alianza/Gremio:</label>
          <input type="text" id="set-name" class="form-input" placeholder="Ej: Los-Perversos">
        </div>
        
        <div class="form-group">
          <label for="set-level">Nivel actual del Gremio:</label>
          <input type="number" id="set-level" class="form-input" placeholder="Ej: 50">
        </div>
        
        <div class="form-group">
          <label for="set-server">Servidor del Juego:</label>
          <input type="text" id="set-server" class="form-input" placeholder="Ej: Rubilax, Tal Kasha...">
        </div>
        
        <div class="form-group">
          <label for="set-desc">Anuncio del tablón / Descripción corta:</label>
          <textarea id="set-desc" class="form-input" rows="3" placeholder="Escribe un saludo o metas actuales del gremio..."></textarea>
        </div>

        <button class="btn btn-primary" style="margin-top: 0.5rem;" onclick="window.saveSettings()">Guardar Configuración</button>
      </div>
    </div>

  </div>

  <!-- MODAL A: AUTENTICACIÓN (LOGIN ADMIN) -->
  <div id="authModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Acceso de Administrador</h3>
        <button class="close-modal-btn" onclick="window.closeAuthModal()">&times;</button>
      </div>
      <div class="form-group">
        <label for="auth-email">Correo Electrónico:</label>
        <input type="email" id="auth-email" class="form-input" placeholder="admin@correo.com">
      </div>
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="auth-pass">Contraseña:</label>
        <input type="password" id="auth-pass" class="form-input" placeholder="••••••••">
      </div>
      <button id="btnSubmitAuth" class="btn btn-primary" style="width: 100%;" onclick="window.submitLogin()">Ingresar</button>
    </div>
  </div>

  <!-- MODAL B: AGREGAR PERSONAJE (PJ) -->
  <div id="pjModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="pjModalTitle">Agregar PJ</h3>
        <button class="close-modal-btn" onclick="window.closePJModal()">&times;</button>
      </div>
      
      <div class="form-group">
        <label for="pj-name">Nombre del Personaje:</label>
        <input type="text" id="pj-name" class="form-input" placeholder="Ej: Perverso-Master">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div class="form-group">
          <label for="pj-class">Clase:</label>
          <select id="pj-class" class="form-input">
            <option value="Iop">Yopuka</option>
            <option value="Cra">Ocra</option>
            <option value="Eniripsa">Eniripsa</option>
            <option value="Sram">Sram</option>
            <option value="Sacrier">Sacrógrito</option>
            <option value="Sadida">Sadida</option>
            <option value="Osamodas">Osamodas</option>
            <option value="Enutrof">Anutrof</option>
            <option value="Xelor">Xelor</option>
            <option value="Pandawa">Pandawa</option>
            <option value="Ecaflip">Zurcarák</option>
            <option value="Feca">Feca</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pj-level">Nivel:</label>
          <input type="number" id="pj-level" class="form-input" value="1" min="1" max="200">
        </div>
      </div>

      <!-- Añadir Oficios dinámicamente -->
      <div class="form-group" style="margin-top: 0.5rem; margin-bottom: 0.5rem;">
        <label>Vincular Oficio:</label>
        <div style="display: flex; gap: 0.5rem;">
          <select id="pj-oficio-select" class="form-input" style="flex: 1;">
            <option value="">-- Elige Oficio --</option>
            <option value="Alquimista|reco">Alquimista (Reco)</option>
            <option value="Campesino|reco">Campesino (Reco)</option>
            <option value="Leñador|reco">Leñador (Reco)</option>
            <option value="Minero|reco">Minero (Reco)</option>
            <option value="Pescador|reco">Pescador (Reco)</option>
            <option value="Forjador|craft">Forjador (Craft)</option>
            <option value="Escultor|craft">Escultor (Craft)</option>
            <option value="Sastre|craft">Sastre (Craft)</option>
            <option value="Zapatero|craft">Zapatero (Craft)</option>
            <option value="Joyero|craft">Joyero (Craft)</option>
          </select>
          <button class="btn" type="button" onclick="window.addOficioTag()">+</button>
        </div>
        <div id="pj-oficios-tags" class="selected-oficios-tags"></div>
      </div>

      <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="window.savePJ()">Guardar Personaje</button>
    </div>
  </div>

<!-- LÓGICA CORE DE FIREBASE CON DEBUGGING AVANZADO -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    console.log("[DEBUG] Iniciando script de Firebase...");

    // Tu configuración oficial de Firebase para Los-Perversos
    const firebaseConfig = {
      apiKey: "AIzaSyD-ZARNy4qlxb8b5p26-DcuHQEw3BSn-oE",
      authDomain: "miembros-c2d72.firebaseapp.com",
      projectId: "miembros-c2d72",
      storageBucket: "miembros-c2d72.firebasestorage.app",
      messagingSenderId: "489865592759",
      appId: "1:489865592759:web:1fb67cf15858e2639cf232",
      measurementId: "G-1W6NPV7X03"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    console.log("[DEBUG] Firebase SDK Inicializado correctamente.");

    // --- ESTADO EN MEMORIA DE LA APP ---
    window.MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    window.WEEKDAYS = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
    
    window.guildData = { name: 'Los-Perversos', level: 1, server: 'Cargando...', desc: '...' };
    window.membersList = [];
    window.eventsData = {};

    window.currentYear = new Date().getFullYear();
    window.currentMonth = new Date().getMonth();
    window.editingMemberId = null;
    window.tempOficios = [];

    // --- CONTROL DE ARRANQUE SEGURO (ESPERAR AL DOM) ---
    document.addEventListener("DOMContentLoaded", () => {
      console.log("[DEBUG] DOM Completamente cargado. Activando listeners onSnapshot...");
      
      // 1. Escuchar metadatos del gremio
      onSnapshot(doc(db, "guild_config", "los-perversos"), (docSnap) => {
        console.log("[DEBUG Snap] Datos de guild_config recibidos.");
        if (docSnap.exists()) {
          console.log("[DEBUG Snap] Documento los-perversos existe:", docSnap.data());
          window.guildData = docSnap.data();
        } else {
          console.warn("[DEBUG Snap] El documento los-perversos NO existe. Intentando crear plantilla inicial...");
          setDoc(doc(db, "guild_config", "los-perversos"), window.guildData)
            .then(() => console.log("[DEBUG Init] Documento base de guild_config creado con éxito."))
            .catch(err => console.error("[DEBUG Init Error] Falló inicializar documento base:", err));
        }
        renderGuildHeader();
        fillGuildSettingsForm();
      }, (error) => {
        console.error("[DEBUG Snap Error] Error escuchando guild_config:", error);
      });

      // 2. Escuchar lista de miembros
      onSnapshot(doc(db, "guild_data", "members"), (docSnap) => {
        console.log("[DEBUG Snap] Datos de miembros recibidos.");
        if (docSnap.exists()) {
          window.membersList = docSnap.data().list || [];
        } else {
          console.warn("[DEBUG Snap] No existe el documento guild_data/members. Intentando inicializar...");
          setDoc(doc(db, "guild_data", "members"), { list: [] })
            .catch(err => console.error("[DEBUG Init Error] No se pudo inicializar guild_data/members:", err));
        }
        window.renderMembers();
      }, (error) => {
        console.error("[DEBUG Snap Error] Error escuchando miembros:", error);
      });

      // 3. Escuchar eventos / Almanax
      onSnapshot(doc(db, "guild_data", "events"), (docSnap) => {
        console.log("[DEBUG Snap] Datos de eventos recibidos.");
        window.eventsData = docSnap.exists() ? (docSnap.data().schedule || {}) : {};
        const calSec = document.getElementById('sec-calendar');
        if (calSec && calSec.classList.contains('active')) {
          window.renderCalendar();
        } else {
          updateStatsOnly();
        }
      }, (error) => {
        console.error("[DEBUG Snap Error] Error escuchando eventos:", error);
      });

      // 4. Monitoreo de Autenticación
      onAuthStateChanged(auth, (user) => {
        console.log("[DEBUG Auth] Cambió el estado de autenticación.");
        const bGuest = document.getElementById('authBadgeGuest');
        const bAdmin = document.getElementById('authBadgeAdmin');
        const bAction = document.getElementById('btnAuthAction');

        if (user) {
          console.log("[DEBUG Auth] Usuario Administrador LOGUEADO:", user.email);
          document.body.classList.add('is-admin');
          if (bGuest) bGuest.classList.add('hidden');
          if (bAdmin) bAdmin.classList.remove('hidden');
          if (bAction) bAction.textContent = "Salir";
        } else {
          console.log("[DEBUG Auth] Sesión actual: INVITADO (Modo lectura)");
          document.body.classList.remove('is-admin');
          if (bAdmin) bAdmin.classList.add('hidden');
          if (bGuest) bGuest.classList.remove('hidden');
          if (bAction) bAction.textContent = "Entrar";
        }
        window.renderMembers();
      });

      // 5. Modales (Cierre por click fuera)
      const pModal = document.getElementById('pjModal');
      const aModal = document.getElementById('authModal');
      if (pModal) pModal.addEventListener('click', function(e) { if (e.target === this) window.closePJModal(); });
      if (aModal) aModal.addEventListener('click', function(e) { if (e.target === this) window.closeAuthModal(); });
    });

    // --- FUNCIONES EXPUESTAS AL AMBITO GLOBAL ---
    window.handleAuthAction = function() {
      if (auth.currentUser) {
        signOut(auth).then(() => alert('Sesión de administrador cerrada.'));
      } else {
        const am = document.getElementById('authModal');
        if (am) am.classList.add('open');
      }
    };

    window.closeAuthModal = function() {
      const am = document.getElementById('authModal');
      if (am) am.classList.remove('open');
      const ae = document.getElementById('auth-email');
      const ap = document.getElementById('auth-pass');
      if (ae) ae.value = '';
      if (ap) ap.value = '';
    };

    window.submitLogin = function() {
      const emailEl = document.getElementById('auth-email');
      const passEl = document.getElementById('auth-pass');
      const btn = document.getElementById('btnSubmitAuth');
      
      if (!emailEl || !passEl) return;
      
      const email = emailEl.value.trim();
      const pass = passEl.value;

      if (!email || !pass) { alert('Completa los campos.'); return; }
      if (btn) { btn.disabled = true; btn.textContent = "Validando..."; }

      console.log("[DEBUG Auth] Intentando signIn con:", email);
      signInWithEmailAndPassword(auth, email, pass)
        .then((cred) => {
          console.log("[DEBUG Auth] Login exitoso para UID:", cred.user.uid);
          window.closeAuthModal();
        })
        .catch((error) => {
          console.error("[DEBUG Auth Error] Falló el inicio de sesión:", error);
          alert('Credenciales incorrectas de administrador. Error: ' + error.code);
        })
        .finally(() => {
          if (btn) { btn.disabled = false; btn.textContent = "Ingresar"; }
        });
    };

    window.showSection = function(name, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      
      const targetSec = document.getElementById('sec-' + name);
      if (targetSec) targetSec.classList.add('active');
      if (btn) btn.classList.add('active');
      
      if (name === 'calendar') window.renderCalendar();
      if (name === 'members') window.renderMembers();
    };

    // --- LOGICA DE MIEMBROS & FIRESTORE ---
    window.renderMembers = function() {
      const grid = document.getElementById('membersGrid');
      if (!grid) return;
      grid.innerHTML = '';
      
      if (window.membersList.length === 0) {
        grid.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No hay jugadores registrados.</p>';
        updateStatsOnly();
        return;
      }

      window.membersList.forEach(m => {
        const card = document.createElement('div');
        card.className = 'member-card';
        card.id = 'card-' + m.id;
        const roleClass = { leader:'role-leader', officer:'role-officer', member:'role-member' }[m.role] || 'role-member';
        const roleLabel = { leader:'Líder', officer:'Oficial', member:'Miembro' }[m.role] || 'Miembro';
        const initials = m.username ? m.username.slice(0,2).toUpperCase() : '??';
        
        const adminButtons = document.body.classList.contains('is-admin') 
          ? `<div style="display:flex;gap:0.5rem;margin-top:1rem" class="admin-only">
               <button class="btn btn-outline" style="font-size:0.68rem;padding:0.4rem 0.8rem" onclick="window.openPJModal('${m.id}')">+ Agregar PJ</button>
               <button class="btn btn-danger" onclick="window.removeMember('${m.id}')">Eliminar jugador</button>
             </div>`
          : '';

        card.innerHTML = `
          <div class="member-header" onclick="window.toggleCard('${m.id}')">
            <div class="member-avatar">${initials}</div>
            <div>
              <div class="member-name">${m.username || 'Sin Nombre'}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.1rem">${(m.pjs || []).length} personaje${(m.pjs || []).length !== 1 ? 's' : ''}</div>
            </div>
            <span class="member-role ${roleClass}">${roleLabel}</span>
            <span class="expand-icon">&#9660;</span>
          </div>
          <div class="member-body">
            <div id="pjlist-${m.id}">${window.renderPJList(m)}</div>
            ${adminButtons}
          </div>
        `;
        grid.appendChild(card);
      });
      updateStatsOnly();
    };

    window.renderPJList = function(m) {
      if (!m.pjs || !m.pjs.length) return '<p style="color:var(--text-muted);font-style:italic;font-size:0.8rem;padding:0.3rem 0">Sin personajes registrados.</p>';
      const isSharedAdmin = document.body.classList.contains('is-admin');
      
      return m.pjs.map(pj => `
        <div class="pj-item">
          <div class="pj-header">
            <div>
              <span class="pj-name">${pj.name}</span>
              <span class="pj-class"> - ${pj.cls}</span>
            </div>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <span class="pj-level">Nv ${pj.level}</span>
              ${isSharedAdmin ? `<button class="btn btn-danger admin-only" onclick="window.removePJ('${m.id}','${pj.id}')">x</button>` : ''}
            </div>
          </div>
          <div class="pj-oficios">
            ${(pj.oficios || []).map(o => `<span class="oficio-tag oficio-${o.type}">${o.name}</span>`).join('') || '<span style="font-size:0.7rem;color:var(--text-muted);font-style:italic">Sin oficios</span>'}
          </div>
        </div>
      `).join('');
    };

    window.toggleCard = function(id) {
      const card = document.getElementById('card-' + id);
      if (card) card.classList.toggle('open');
    };

    window.addMember = function() {
      const userEl = document.getElementById('inp-user');
      const roleEl = document.getElementById('inp-role');
      if (!userEl || !roleEl) return;

      const username = userEl.value.trim();
      const role = roleEl.value;
      if (!username) { alert('Ingresa un nombre de usuario.'); return; }
      
      const newMember = { id: "m_" + Date.now(), username, role, pjs: [] };
      
      console.log("[DEBUG Action] Intentando añadir jugador a Firestore:", newMember);
      updateDoc(doc(db, "guild_data", "members"), {
        list: arrayUnion(newMember)
      }).then(() => {
        console.log("[DEBUG Action] Jugador añadido exitosamente.");
        userEl.value = '';
      }).catch(err => {
        console.error("[DEBUG Action Error] Error al añadir miembro:", err);
        alert("No se pudo guardar el miembro. Revisa la consola (F12). ¿Estás logueado como admin?");
      });
    };

    window.removeMember = function(id) {
      if (!confirm('¿Eliminar este jugador y todos sus personajes?')) return;
      const target = window.membersList.find(m => m.id === id);
      if (!target) return;

      console.log("[DEBUG Action] Intentando eliminar jugador:", id);
      updateDoc(doc(db, "guild_data", "members"), {
        list: arrayRemove(target)
      }).then(() => console.log("[DEBUG Action] Jugador eliminado con éxito."))
        .catch(err => console.error("[DEBUG Action Error] Error al eliminar jugador:", err));
    };

    window.removePJ = function(memberId, pjId) {
      const m = window.membersList.find(m => m.id === memberId);
      if (!m) return;
      
      const updatedPjs = m.pjs.filter(p => p.id !== pjId);
      const updatedList = window.membersList.map(member => {
        if (member.id === memberId) {
          return { ...member, pjs: updatedPjs };
        }
        return member;
      });

      console.log("[DEBUG Action] Intentando eliminar personaje:", pjId, "del jugador:", memberId);
      updateDoc(doc(db, "guild_data", "members"), { list: updatedList })
        .then(() => console.log("[DEBUG Action] Personaje removido con éxito."))
        .catch(err => console.error("[DEBUG Action Error] Error al remover personaje:", err));
    };

    // --- MODAL PJ ---
    window.openPJModal = function(memberId) {
      window.editingMemberId = memberId;
      window.tempOficios = [];
      
      const nameEl = document.getElementById('pj-name');
      const lvlEl = document.getElementById('pj-level');
      const tagsEl = document.getElementById('pj-oficios-tags');
      const titleEl = document.getElementById('pjModalTitle');
      
      if (nameEl) nameEl.value = '';
      if (lvlEl) lvlEl.value = '1';
      if (tagsEl) tagsEl.innerHTML = '';
      
      const m = window.membersList.find(m => m.id === memberId);
      if (titleEl && m) titleEl.textContent = 'Agregar PJ para ' + m.username;
      
      const pm = document.getElementById('pjModal');
      if (pm) pm.classList.add('open');
    };

    window.closePJModal = function() {
      const pm = document.getElementById('pjModal');
      if (pm) pm.classList.remove('open');
      window.editingMemberId = null;
    };

    window.addOficioTag = function() {
      const sel = document.getElementById('pj-oficio-select');
      if (!sel || !sel.value) return;
      const [name, type] = sel.value.split('|');
      if (window.tempOficios.find(o => o.name === name)) return;
      window.tempOficios.push({ name, type });
      window.renderOficioTags();
    };

    window.renderOficioTags = function() {
      const container = document.getElementById('pj-oficios-tags');
      if (!container) return;
      container.innerHTML = window.tempOficios.map((o, i) =>
        `<span class="selected-oficio" onclick="window.removeOficioTag(${i})" title="Quitar">${o.name} ×</span>`
      ).join('');
    };

    window.removeOficioTag = function(i) {
      window.tempOficios.splice(i, 1);
      window.renderOficioTags();
    };

    window.savePJ = function() {
      const nameEl = document.getElementById('pj-name');
      const clsEl = document.getElementById('pj-class');
      const lvlEl = document.getElementById('pj-level');
      
      if (!nameEl || !clsEl || !lvlEl) return;

      const name = nameEl.value.trim();
      const cls  = clsEl.value;
      const level = parseInt(lvlEl.value) || 1;
      if (!name) { alert('Ingresa el nombre del personaje.'); return; }
      
      const updatedList = window.membersList.map(member => {
        if (member.id === window.editingMemberId) {
          const pjs = member.pjs || [];
          const newPj = { id: "pj_" + Date.now(), name, cls, level, oficios: [...window.tempOficios] };
          return { ...member, pjs: [...pjs, newPj] };
        }
        return member;
      });

      console.log("[DEBUG Action] Intentando guardar nuevo personaje en la lista modificada...");
      updateDoc(doc(db, "guild_data", "members"), { list: updatedList })
        .then(() => {
          console.log("[DEBUG Action] Personaje guardado con éxito.");
          window.closePJModal();
        })
        .catch(err => {
          console.error("[DEBUG Action Error] Falló guardar personaje:", err);
          alert("Error al guardar personaje. Revisa permisos.");
        });
    };

    // --- CALENDAR ---
    window.renderCalendar = function() {
      const label = document.getElementById('calMonthLabel');
      if (label) label.textContent = window.MONTHS[window.currentMonth] + ' ' + window.currentYear;

      const wdays = document.getElementById('calWeekdays');
      if (wdays) wdays.innerHTML = window.WEEKDAYS.map(d => `<div class="weekday-label">${d}</div>`).join('');

      const grid = document.getElementById('calGrid');
      if (!grid) return;
      grid.innerHTML = '';

      const firstDay = new Date(window.currentYear, window.currentMonth, 1).getDay();
      const daysInMonth = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
      const today = new Date();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-day empty';
        grid.appendChild(empty);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const events = window.eventsData[dateKey] || [];
        const isToday = today.getFullYear() === window.currentYear && today.getMonth() === window.currentMonth && today.getDate() === d;

        const cell = document.createElement('div');
        cell.className = 'cal-day' + (isToday ? ' today' : '') + (events.length ? ' has-event' : '');
        cell.innerHTML = `<div class="day-num">${d}</div>` +
          events.map(e => `<div class="day-event event-${e.type}">${e.desc}</div>`).join('');
        grid.appendChild(cell);
      }
      updateStatsOnly();
    };

    window.changeMonth = function(dir) {
      window.currentMonth += dir;
      if (window.currentMonth < 0)  { window.currentMonth = 11; window.currentYear--; }
      if (window.currentMonth > 11) { window.currentMonth = 0;  window.currentYear++; }
      window.renderCalendar();
    };

    window.addEvent = function() {
      const dayEl = document.getElementById('inp-evDay');
      const typeEl = document.getElementById('inp-evType');
      const descEl = document.getElementById('inp-evDesc');
      
      if (!dayEl || !typeEl || !descEl) return;

      const day  = parseInt(dayEl.value);
      const type = typeEl.value;
      const desc = descEl.value.trim();
      if (!day || !desc) { alert('Completa el día y la descripción.'); return; }
      
      const dateKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      
      const currentSchedule = { ...window.eventsData };
      if (!currentSchedule[dateKey]) currentSchedule[dateKey] = [];
      currentSchedule[dateKey].push({ desc, type });

      console.log("[DEBUG Action] Intentando guardar evento para la fecha:", dateKey);
      updateDoc(doc(db, "guild_data", "events"), { schedule: currentSchedule })
        .then(() => {
          console.log("[DEBUG Action] Evento agregado correctamente.");
          dayEl.value = '';
          descEl.value = '';
        })
        .catch(err => {
          console.error("[DEBUG Action Error] Error al añadir evento:", err);
          alert("Error al añadir evento en Firebase.");
        });
    };

    // --- SETTINGS (CON FILTROS DE VERIFICACIÓN) ---
    window.saveSettings = function() {
      console.log("[DEBUG Action] Iniciando proceso de window.saveSettings()...");
      
      // Verificación previa de login en JS
      if (!auth.currentUser) {
        console.error("[DEBUG Action Error] Bloqueado en Frontend: auth.currentUser es NULL.");
        alert("¡Error en Front-end!\nNo has iniciado sesión como administrador legítimo en este navegador. Haz clic en 'Entrar' arriba a la derecha.");
        return;
      }

      const nameEl = document.getElementById('set-name');
      const lvlEl = document.getElementById('set-level');
      const srvEl = document.getElementById('set-server');
      const descEl = document.getElementById('set-desc');

      const name = nameEl ? nameEl.value.trim() : window.guildData.name;
      const level = lvlEl ? (parseInt(lvlEl.value) || window.guildData.level) : window.guildData.level;
      const server = srvEl ? srvEl.value.trim() : window.guildData.server;
      const desc = descEl ? descEl.value.trim() : window.guildData.desc;

      const payload = { name, level, server, desc };
      console.log("[DEBUG Action] Payload a enviar a 'guild_config/los-perversos':", payload);

      updateDoc(doc(db, "guild_config", "los-perversos"), payload)
        .then(() => {
          console.log("[DEBUG Action] Firestore respondió: ¡GUARDADO CORRECTAMENTE!");
          alert('¡Éxito! Configuración global guardada en la base de datos de Firestore.');
        })
        .catch(err => {
          console.error("[DEBUG Action Error] Firestore rechazó la escritura:", err);
          alert("¡Firebase rechazó los datos!\nCódigo de error: " + err.code + "\nMensaje: " + err.message + "\n\nRevisa si publicaste correctamente las Rules en tu consola Firebase.");
        });
    };

    function renderGuildHeader() {
      const titleContainer = document.getElementById('guildName');
      if (titleContainer && window.guildData.name) {
        if (window.guildData.name.includes('-')) {
          titleContainer.innerHTML = `${window.guildData.name.split('-')[0]}-<span>${window.guildData.name.split('-')[1]}</span>`;
        } else {
          titleContainer.textContent = window.guildData.name;
        }
      }
      const gs = document.getElementById('guildServer');
      const gd = document.getElementById('guildDesc');
      if (gs) gs.textContent = `Servidor: ${window.guildData.server || '--'} | Nivel de gremio: ${window.guildData.level || '--'}`;
      if (gd) gd.textContent = window.guildData.desc || '';
    }

    function fillGuildSettingsForm() {
      const el = document.getElementById('set-name');
      const lvlEl = document.getElementById('set-level');
      const srvEl = document.getElementById('set-server');
      const descEl = document.getElementById('set-desc');

      if (el) el.value = window.guildData.name || '';
      if (lvlEl) lvlEl.value = window.guildData.level || 1;
      if (srvEl) srvEl.value = window.guildData.server || '';
      if (descEl) descEl.value = window.guildData.desc || '';
    }

    function updateStatsOnly() {
      const su = document.getElementById('statUsers');
      const sp = document.getElementById('statPJs');
      const se = document.getElementById('statEvents');
      
      if (su) su.textContent = window.membersList.length;
      if (sp) sp.textContent = window.membersList.reduce((a,m) => a + (m.pjs ? m.pjs.length : 0), 0);
      
      if (se) {
        const monthKey = `${window.currentYear}-${String(window.currentMonth+1).padStart(2,'0')}`;
        const evCount = Object.keys(window.eventsData).filter(k => k.startsWith(monthKey)).reduce((a, k) => a + window.eventsData[k].length, 0);
        se.textContent = evCount;
      }
    }
  </script>
</body>
</html>
